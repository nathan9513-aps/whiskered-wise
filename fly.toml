app = "whatsapp-backend-whiskered" # Puoi cambiarlo
primary_region = "fra" # Frankfurt (puoi cambiarlo)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false # Mantenere false per whatsapp-web.js
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "whatsapp_auth_data"
  destination = "/app/.wwebjs_auth"
  initial_size = "1GB"
