version: "3.8"

services:
  app:
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=80
      - HTTPS_PORT=443
      - DOMAIN=${DOMAIN:-barbershopmarrakesh.com}
    restart: unless-stopped

volumes:
  app_data:
    # Use existing volume or create a new one automatically
    # If the user has a pre-existing volume they want to use,
    # they can set external: true here.
    driver: local